<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 160" role="img" aria-label="Nexyyra Events">
  <defs>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#D4AF37" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <image
    width="440"
    height="160"
    href="/brand/logo-primary.png"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#goldGlow)"
  />
</svg>
