<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 96 96" role="img" aria-hidden="true">
  <defs>
    <filter id="markGoldGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#D4AF37" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <image
    width="96"
    height="96"
    href="/brand/logo-symbol.png"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#markGoldGlow)"
  />
</svg>
