name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix apps/web

      - name: Lint
        run: npm run lint --prefix apps/web

      - name: Typecheck
        run: npm run typecheck --prefix apps/web

      - name: Build
        run: npm run build --prefix apps/web
        env:
          NEXT_PUBLIC_APP_URL: https://nexyyra.com
          NEXT_PUBLIC_API_URL: https://nexyyra.com/api
          MEDIA_PROVIDER: google-drive
          GOOGLE_DRIVE_FOLDER_ID: 1UZR_UhiZfVvcLUNvDJi3Rvw8udkfKgYM
